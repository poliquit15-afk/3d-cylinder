<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Cylinder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal: #00e5cc;
    --teal-dim: #00897b;
    --bg: #050d10;
    --panel: rgba(0,229,204,0.05);
    --border: rgba(0,229,204,0.18);
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    color: var(--teal);
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  /* Radial glow */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(0,229,204,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  header {
    text-align: center;
    margin-bottom: 16px;
    position: relative;
    z-index: 5;
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 28px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--teal);
    text-shadow: 0 0 20px rgba(0,229,204,0.6), 0 0 60px rgba(0,229,204,0.2);
  }

  .subtitle {
    font-size: 10px;
    letter-spacing: 0.4em;
    color: rgba(0,229,204,0.4);
    margin-top: 4px;
    text-transform: uppercase;
  }

  #canvas-wrap {
    position: relative;
    z-index: 5;
    border: 1px solid var(--border);
    box-shadow: 0 0 40px rgba(0,229,204,0.08), inset 0 0 40px rgba(0,0,0,0.4);
  }

  canvas { display: block; }

  /* Stats panel */
  .stats {
    display: flex;
    gap: 24px;
    margin-top: 14px;
    position: relative;
    z-index: 5;
  }

  .stat {
    text-align: center;
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 8px 18px;
  }

  .stat .val {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--teal);
    text-shadow: 0 0 10px rgba(0,229,204,0.5);
  }

  .stat .key {
    font-size: 9px;
    letter-spacing: 0.3em;
    color: rgba(0,229,204,0.35);
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* Sliders */
  .sliders {
    display: flex;
    gap: 20px;
    margin-top: 14px;
    flex-wrap: wrap;
    justify-content: center;
    position: relative;
    z-index: 5;
  }

  .sl-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }

  .sl-group label {
    font-size: 9px;
    letter-spacing: 0.3em;
    color: rgba(0,229,204,0.45);
    text-transform: uppercase;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 110px;
    height: 2px;
    background: rgba(0,229,204,0.25);
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    background: var(--teal);
    box-shadow: 0 0 8px rgba(0,229,204,0.8);
    cursor: pointer;
    border-radius: 0;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    flex-wrap: wrap;
    justify-content: center;
    position: relative;
    z-index: 5;
  }

  button {
    background: transparent;
    border: 1px solid var(--border);
    color: rgba(0,229,204,0.6);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    padding: 7px 16px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
  }

  button:hover {
    background: rgba(0,229,204,0.1);
    color: var(--teal);
    border-color: var(--teal);
    box-shadow: 0 0 12px rgba(0,229,204,0.2);
  }

  .hint {
    margin-top: 12px;
    font-size: 9px;
    letter-spacing: 0.35em;
    color: rgba(0,229,204,0.2);
    text-transform: uppercase;
    position: relative;
    z-index: 5;
  }

  /* Corner decorations */
  .corner {
    position: fixed;
    width: 40px;
    height: 40px;
    z-index: 5;
  }
  .corner::before, .corner::after {
    content: '';
    position: absolute;
    background: var(--teal);
    opacity: 0.4;
  }
  .corner::before { width: 100%; height: 1px; top: 0; left: 0; }
  .corner::after  { width: 1px; height: 100%; top: 0; left: 0; }
  .corner.tr { top: 16px; right: 16px; transform: scaleX(-1); }
  .corner.tl { top: 16px; left: 16px; }
  .corner.br { bottom: 16px; right: 16px; transform: scale(-1); }
  .corner.bl { bottom: 16px; left: 16px; transform: scaleY(-1); }
</style>
</head>
<body>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<header>
  <h1>Cylinder</h1>
  <p class="subtitle">3D Interactive Model</p>
</header>

<div id="canvas-wrap">
  <canvas id="c" width="480" height="380"></canvas>
</div>

<div class="stats">
  <div class="stat"><div class="val" id="rVal">80</div><div class="key">Radius</div></div>
  <div class="stat"><div class="val" id="hVal">200</div><div class="key">Height</div></div>
  <div class="stat"><div class="val" id="sVal">36</div><div class="key">Segments</div></div>
</div>

<div class="sliders">
  <div class="sl-group"><label>Radius</label><input type="range" id="rSlider" min="20" max="150" value="80"></div>
  <div class="sl-group"><label>Height</label><input type="range" id="hSlider" min="40" max="320" value="200"></div>
  <div class="sl-group"><label>Segments</label><input type="range" id="sSlider" min="3" max="64" value="36"></div>
</div>

<div class="controls">
  <button id="toggleBtn">Pause</button>
  <button id="resetBtn">Reset</button>
  <button id="wireBtn">Wireframe</button>
  <button id="slowBtn">Slower</button>
  <button id="fastBtn">Faster</button>
</div>

<p class="hint">drag to rotate · scroll to zoom</p>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  const canvas = document.getElementById('c');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(480, 380);
  renderer.setClearColor(0x000000, 0);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, 480/380, 0.1, 1000);
  camera.position.set(0, 60, 350);
  camera.lookAt(0, 0, 0);

  // Lighting
  const ambient = new THREE.AmbientLight(0x00e5cc, 0.3);
  scene.add(ambient);

  const dirLight = new THREE.DirectionalLight(0x00e5cc, 1.2);
  dirLight.position.set(200, 300, 200);
  scene.add(dirLight);

  const rimLight = new THREE.DirectionalLight(0x0088ff, 0.6);
  rimLight.position.set(-200, -100, -100);
  scene.add(rimLight);

  const pointLight = new THREE.PointLight(0x00e5cc, 0.8, 600);
  pointLight.position.set(0, 200, 100);
  scene.add(pointLight);

  // Cylinder params
  let radius = 80, height = 200, segments = 36;
  let wireframe = false;
  let cylinder, wireMesh;

  function buildCylinder() {
    if (cylinder) {
      scene.remove(cylinder);
      cylinder.geometry.dispose();
    }
    if (wireMesh) {
      scene.remove(wireMesh);
      wireMesh.geometry.dispose();
    }

    const geo = new THREE.CylinderGeometry(radius, radius, height, segments, 1, false);

    const mat = new THREE.MeshPhongMaterial({
      color: 0x006655,
      emissive: 0x003333,
      specular: 0x00e5cc,
      shininess: 80,
      transparent: true,
      opacity: wireframe ? 0.08 : 0.82,
      side: THREE.DoubleSide,
    });

    cylinder = new THREE.Mesh(geo, mat);
    scene.add(cylinder);

    // Wireframe overlay
    const wGeo = new THREE.WireframeGeometry(geo);
    const wMat = new THREE.LineBasicMaterial({
      color: 0x00e5cc,
      transparent: true,
      opacity: wireframe ? 0.9 : 0.25,
    });
    wireMesh = new THREE.LineSegments(wGeo, wMat);
    scene.add(wireMesh);
  }

  buildCylinder();

  // Grid floor
  const gridHelper = new THREE.GridHelper(400, 20, 0x00e5cc, 0x003333);
  gridHelper.position.y = -height/2 - 10;
  gridHelper.material.opacity = 0.3;
  gridHelper.material.transparent = true;
  scene.add(gridHelper);

  // Animation
  let spinning = true;
  let spinSpeed = 0.008;
  let rotX = 0.2, rotY = 0;

  // Drag
  let isDragging = false, lastX, lastY;
  canvas.addEventListener('mousedown', e => {
    isDragging = true;
    lastX = e.clientX; lastY = e.clientY;
  });
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    rotY += (e.clientX - lastX) * 0.008;
    rotX += (e.clientY - lastY) * 0.005;
    rotX = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, rotX));
    lastX = e.clientX; lastY = e.clientY;
  });
  window.addEventListener('mouseup', () => isDragging = false);

  // Touch
  canvas.addEventListener('touchstart', e => {
    isDragging = true;
    lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
  });
  window.addEventListener('touchmove', e => {
    if (!isDragging) return;
    rotY += (e.touches[0].clientX - lastX) * 0.008;
    rotX += (e.touches[0].clientY - lastY) * 0.005;
    lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
  });
  window.addEventListener('touchend', () => isDragging = false);

  // Scroll zoom
  canvas.addEventListener('wheel', e => {
    camera.position.z = Math.max(80, Math.min(600, camera.position.z + e.deltaY * 0.3));
    e.preventDefault();
  }, { passive: false });

  // Animate
  function animate() {
    requestAnimationFrame(animate);
    if (spinning && !isDragging) rotY += spinSpeed;
    cylinder.rotation.y = rotY;
    cylinder.rotation.x = rotX;
    wireMesh.rotation.y = rotY;
    wireMesh.rotation.x = rotX;
    renderer.render(scene, camera);
  }
  animate();

  // Sliders
  function updateStats() {
    document.getElementById('rVal').textContent = radius;
    document.getElementById('hVal').textContent = height;
    document.getElementById('sVal').textContent = segments;
    gridHelper.position.y = -height/2 - 10;
    buildCylinder();
    cylinder.rotation.y = rotY;
    cylinder.rotation.x = rotX;
    wireMesh.rotation.y = rotY;
    wireMesh.rotation.x = rotX;
  }

  document.getElementById('rSlider').addEventListener('input', e => { radius = +e.target.value; updateStats(); });
  document.getElementById('hSlider').addEventListener('input', e => { height = +e.target.value; updateStats(); });
  document.getElementById('sSlider').addEventListener('input', e => { segments = +e.target.value; updateStats(); });

  // Buttons
  const toggleBtn = document.getElementById('toggleBtn');
  toggleBtn.addEventListener('click', () => {
    spinning = !spinning;
    toggleBtn.textContent = spinning ? 'Pause' : 'Play';
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    radius = 80; height = 200; segments = 36;
    spinSpeed = 0.008; spinning = true;
    rotX = 0.2; rotY = 0;
    camera.position.z = 350;
    document.getElementById('rSlider').value = 80;
    document.getElementById('hSlider').value = 200;
    document.getElementById('sSlider').value = 36;
    toggleBtn.textContent = 'Pause';
    wireframe = false;
    document.getElementById('wireBtn').textContent = 'Wireframe';
    updateStats();
  });

  document.getElementById('wireBtn').addEventListener('click', () => {
    wireframe = !wireframe;
    document.getElementById('wireBtn').textContent = wireframe ? 'Solid' : 'Wireframe';
    buildCylinder();
    cylinder.rotation.y = rotY;
    cylinder.rotation.x = rotX;
    wireMesh.rotation.y = rotY;
    wireMesh.rotation.x = rotX;
  });

  document.getElementById('slowBtn').addEventListener('click', () => { spinSpeed = Math.min(spinSpeed + 0.003, 0.05); });
  document.getElementById('fastBtn').addEventListener('click', () => { spinSpeed = Math.max(spinSpeed - 0.002, 0.001); });
</script>
</body>
</html>
